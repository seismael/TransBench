# A-MIG p95 retry - single run
[[bench]]
run_name = "cuda-amig-poison95"
arch = "mig"
dataset = "poisoned_needle"
poison_ratio = 0.95
num_layers = 6
hidden_size = 256
ffn_mult = 2.0
num_heads = 8
num_kv_heads = 4
seq_len = 256
batch_size = 4
vocab_size = 4096
warmup = 50
steps = 2000
lr = 3e-4
device = "cuda"
dtype = "float32"
mig_gate_dim = 64
mig_lambda = 0.001
mig_keep_ratio = 0.05
mig_layer_keep_ratios = [0.05, 0.05, 0.10, 0.50, 1.0, 1.0]
aux_warmup_steps = 200
tags = ["mig-poison", "poisoned_needle", "amig", "p95"]
