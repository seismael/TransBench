# CPU baseline benchmark suite
# All 10 architectures × 2 datasets (synthetic + tinystories)
# Small, fast configs for quick comparable runs (~30 steps each)

# ─────────────────────────────────────────────────────────────────
# GQA – Grouped Query Attention
# ─────────────────────────────────────────────────────────────────
[[bench]]
run_name  = "cpu-gqa-synthetic"
arch      = "gqa"
dataset   = "synthetic"
num_layers  = 4
hidden_size = 128
ffn_mult    = 2.0
num_heads   = 4
num_kv_heads = 2
vocab_size  = 4096
seq_len     = 64
batch_size  = 2
warmup      = 3
steps       = 30
lr          = 3e-4
device      = "cpu"
dtype       = "float32"
tags        = ["cpu", "synthetic", "baseline"]

[[bench]]
run_name  = "cpu-gqa-tinystories"
arch      = "gqa"
dataset   = "tinystories"
num_layers  = 4
hidden_size = 128
ffn_mult    = 2.0
num_heads   = 4
num_kv_heads = 2
vocab_size  = 4096
seq_len     = 64
batch_size  = 2
warmup      = 3
steps       = 30
lr          = 3e-4
device      = "cpu"
dtype       = "float32"
tags        = ["cpu", "tinystories", "baseline"]

