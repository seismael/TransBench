# MIG Poisoned Needle Noise Sweep (CUDA, 2000 steps)
# Validates MIG advantage on a second noise dataset type.
# 12 runs: 3 architectures x 4 poison_ratio levels

# ---------------------------------------------------------------
#  poison_ratio = 0.50 (50% corruption - mild)
# ---------------------------------------------------------------

[[bench]]
run_name = "cuda-gqa-poison50"
arch = "gqa"
dataset = "poisoned_needle"
poison_ratio = 0.50
num_layers = 6
hidden_size = 256
ffn_mult = 2.0
num_heads = 8
num_kv_heads = 4
seq_len = 256
batch_size = 4
vocab_size = 4096
warmup = 50
steps = 2000
lr = 3e-4
device = "cuda"
dtype = "float32"
tags = ["mig-poison", "poisoned_needle", "gqa", "p50"]

[[bench]]
run_name = "cuda-mig-poison50"
arch = "mig"
dataset = "poisoned_needle"
poison_ratio = 0.50
num_layers = 6
hidden_size = 256
ffn_mult = 2.0
num_heads = 8
num_kv_heads = 4
seq_len = 256
batch_size = 4
vocab_size = 4096
warmup = 50
steps = 2000
lr = 3e-4
device = "cuda"
dtype = "float32"
mig_gate_dim = 64
mig_lambda = 0.001
aux_warmup_steps = 200
tags = ["mig-poison", "poisoned_needle", "mig", "p50"]

[[bench]]
run_name = "cuda-amig-poison50"
arch = "mig"
dataset = "poisoned_needle"
poison_ratio = 0.50
num_layers = 6
hidden_size = 256
ffn_mult = 2.0
num_heads = 8
num_kv_heads = 4
seq_len = 256
batch_size = 4
vocab_size = 4096
warmup = 50
steps = 2000
lr = 3e-4
device = "cuda"
dtype = "float32"
mig_gate_dim = 64
mig_lambda = 0.001
mig_keep_ratio = 0.05
mig_layer_keep_ratios = [0.05, 0.05, 0.10, 0.50, 1.0, 1.0]
aux_warmup_steps = 200
tags = ["mig-poison", "poisoned_needle", "amig", "p50"]

