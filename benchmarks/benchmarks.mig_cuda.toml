# MIG Noise-Advantage CUDA Final Sweep
# Goal: full 2000-step comparison proving MIG beats GQA on noisy data.
# 12 runs: 3 architectures × 4 noise levels (signal_ratio sweep)

# ═══════════════════════════════════════════════════════════════
#  signal_ratio = 0.50 (50% signal — easy, GQA should win)
# ═══════════════════════════════════════════════════════════════

[[bench]]
run_name = "cuda-gqa-sig50"
arch = "gqa"
dataset = "sparse_signal"
signal_ratio = 0.50
motif_len = 8
num_layers = 6
hidden_size = 256
ffn_mult = 2.0
num_heads = 8
num_kv_heads = 4
seq_len = 256
batch_size = 4
vocab_size = 4096
warmup = 50
steps = 2000
lr = 3e-4
device = "cuda"
dtype = "float32"
tags = ["mig-cuda", "sparse_signal", "gqa", "sig50"]

[[bench]]
run_name = "cuda-mig-sig50"
arch = "mig"
dataset = "sparse_signal"
signal_ratio = 0.50
motif_len = 8
num_layers = 6
hidden_size = 256
ffn_mult = 2.0
num_heads = 8
num_kv_heads = 4
seq_len = 256
batch_size = 4
vocab_size = 4096
warmup = 50
steps = 2000
lr = 3e-4
device = "cuda"
dtype = "float32"
mig_gate_dim = 64
mig_lambda = 0.001
aux_warmup_steps = 200
tags = ["mig-cuda", "sparse_signal", "mig", "sig50"]

[[bench]]
run_name = "cuda-amig-sig50"
arch = "mig"
dataset = "sparse_signal"
signal_ratio = 0.50
motif_len = 8
num_layers = 6
hidden_size = 256
ffn_mult = 2.0
num_heads = 8
num_kv_heads = 4
seq_len = 256
batch_size = 4
vocab_size = 4096
warmup = 50
steps = 2000
lr = 3e-4
device = "cuda"
dtype = "float32"
mig_gate_dim = 64
mig_lambda = 0.001
mig_keep_ratio = 0.05
mig_layer_keep_ratios = [0.05, 0.05, 0.10, 0.50, 1.0, 1.0]
aux_warmup_steps = 200
tags = ["mig-cuda", "sparse_signal", "amig", "sig50"]

