# CUDA baseline benchmark suite
# All 10 architectures × 2 datasets (synthetic + tinystories)
# Extended configs for detailed convergence behavior (500 steps, seq_len=128, batch=4)
# Uses float32 (MX150 sm_61 has no tensor cores; fp16 offers no speedup)

# ─────────────────────────────────────────────────────────────────
# GQA – Grouped Query Attention
# ─────────────────────────────────────────────────────────────────
[[bench]]
run_name  = "cuda-gqa-synthetic"
arch      = "gqa"
dataset   = "synthetic"
num_layers  = 4
hidden_size = 128
ffn_mult    = 2.0
num_heads   = 4
num_kv_heads = 2
vocab_size  = 4096
seq_len     = 128
batch_size  = 4
warmup      = 10
steps       = 500
lr          = 3e-4
device      = "cuda"
dtype       = "float32"
tags        = ["cuda", "synthetic", "baseline"]

[[bench]]
run_name  = "cuda-gqa-tinystories"
arch      = "gqa"
dataset   = "tinystories"
num_layers  = 4
hidden_size = 128
ffn_mult    = 2.0
num_heads   = 4
num_kv_heads = 2
vocab_size  = 4096
seq_len     = 128
batch_size  = 4
warmup      = 10
steps       = 500
lr          = 3e-4
device      = "cuda"
dtype       = "float32"
tags        = ["cuda", "tinystories", "baseline"]

