# CUDA benchmark suite
# 8 architectures x TinyStories (real language modeling)
# Scaled: hidden=256, layers=6, heads=8, seq_len=256, 2000 steps
# Includes aux_warmup_steps and sil_temperature_final for novel archs
# VRAM budget: ~300-500 MB (well within MX150 2 GB)

# ─────────────────────────────────────────────────────────────────
# GQA – Grouped Query Attention (baseline)
# ─────────────────────────────────────────────────────────────────
[[bench]]
run_name  = "cuda-gqa-tinystories"
arch      = "gqa"
dataset   = "tinystories"
num_layers  = 6
hidden_size = 256
ffn_mult    = 2.0
num_heads   = 8
num_kv_heads = 4
vocab_size  = 4096
seq_len     = 256
batch_size  = 4
warmup      = 50
steps       = 2000
lr          = 3e-4
min_lr      = 1e-5
device      = "cuda"
dtype       = "float32"
tags        = ["cuda", "tinystories"]

